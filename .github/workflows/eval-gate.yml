name: Eval Gate

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

env:
  TRACEMIND_API_URL:   https://tracemind-u1wf.onrender.com
  DATASET_NAME:        production-golden-v1
  PASS_RATE_THRESHOLD: 0.80
  JUDGE_CRITERIA:      accurate,helpful,professional
  TRACEMIND_PROJECT:   ci-eval

jobs:
  eval-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install httpx
          pip install -e sdk/python/

      - name: Run eval gate
        env:
          TRACEMIND_API_KEY: ${{ secrets.TRACEMIND_API_KEY }}
        run: |
          python .github/scripts/eval_gate.py || echo "⚠️ Eval gate did not pass — check results artifact for details"

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval_results.json
          retention-days: 30